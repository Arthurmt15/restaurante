services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: restaurante-backend
    ports:
      - "3001:3001"
    volumes:
      - db-data:/app/prisma
    environment:
      - PORT=3001
      - JWT_SECRET=TROQUE_ESTA_CHAVE_SECRETA_EM_PRODUCAO_USE_OPENSSL_RAND_BASE64_32
      - FRONTEND_URL=http://localhost:3000

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/mesas"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: restaurante-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db-data:
